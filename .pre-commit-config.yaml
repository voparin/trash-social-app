repos:
  - repo: local
    hooks:
      - id: verify-gate
        name: Verify gate (repo sanity)
        entry: ./scripts/verify.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Enable if you want tests on every commit (can be slow).
      - id: npm-test
        name: npm test
        entry: bash -lc "npm test"
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: block-wip
        name: Block WIP commits
        entry: ./scripts/hooks/commit-msg-block-wip.sh
        language: system
        stages: [commit-msg]

      - id: require-task-id
        name: Require task ID in commit message
        entry: ./scripts/hooks/commit-msg-require-task-id.sh
        language: system
        stages: [commit-msg]
